<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寄り道の先のボス</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="hero">
      <h1>寄り道の先のボス</h1>
      <p>まっすぐ進めば戦える。寄り道すれば、結末が変わる。</p>
    </header>

    <section class="status-panel">
      <div>主人公HP: <strong id="hp">100</strong></div>
      <div>主人公の思い出: <strong id="hero-memory-count">0</strong></div>
      <div>ボスの思い出: <strong id="boss-memory-count">0</strong></div>
      <div>現在地: <strong id="location">道のはじまり</strong></div>
    </section>

    <section class="map-panel">
      <h2>道マップ</h2>
      <div id="map" class="map" aria-live="polite"></div>
      <p class="map-hint">青: 主人公の思い出 / 赤: ボスの思い出 / 金: ボス</p>
    </section>

    <section class="control-panel">
      <div class="button-row">
        <button id="forward-btn">まっすぐ進む</button>
        <button id="fight-btn" disabled>ボスと戦う</button>
        <button id="reconcile-btn" disabled>ボスと和解する</button>
        <button id="restart-btn">やり直す</button>
      </div>
      <div id="memory-buttons" class="button-row"></div>
    </section>

    <section class="log-panel">
      <h2>ログ</h2>
      <div id="log" class="log" aria-live="polite"></div>
    </section>

    <section class="ending-panel" id="ending-panel" hidden>
      <h2>エンディング</h2>
      <p id="ending-text"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
