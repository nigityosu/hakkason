<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小説を作ろう</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <header class="hero">
            <div class="hero-top">
                <div>
                    <p class="eyebrow">WRITER'S WORKBENCH</p>
                    <h1>小説を作ろう</h1>
                    <p class="subtitle">思いついた物語を、1話ずつ積み上げよう。</p>
                </div>
                <button id="breakBtn" type="button" class="btn btn-accent">🎮 気分転換</button>
            </div>
        </header>

        <section class="composer">
            <label class="label" for="novelTitle">タイトル</label>
            <input id="novelTitle" type="text" placeholder="例: 路地裏の魔法使い" maxlength="80">

            <div class="field-head">
                <label class="label" for="novelBody">本文</label>
                <span id="charCount">0 / 1500</span>
            </div>
            <textarea id="novelBody" placeholder="ここに本文を書いてください" maxlength="1500"></textarea>

            <div class="actions">
                <button id="clearDraftBtn" type="button" class="btn btn-soft">下書きを消す</button>
                <button id="postBtn" type="button" class="btn btn-primary">投稿する</button>
            </div>
        </section>

        <section class="detour-lab">
            <div class="detour-head">
                <h2>寄り道ラボ</h2>
                <p>詰まったら寄り道して、物語の枝を伸ばそう。</p>
            </div>
            <div class="detour-controls">
                <label class="label" for="detourType">寄り道タイプ</label>
                <select id="detourType">
                    <option value="character">人物の寄り道</option>
                    <option value="event">事件の寄り道</option>
                    <option value="world">世界観の寄り道</option>
                </select>
                <button id="detourBtn" type="button" class="btn btn-primary">寄り道を生成</button>
            </div>
            <article id="detourResult" class="detour-result" aria-live="polite">
                「寄り道を生成」を押すと、創作用の分岐アイデアが出ます。
            </article>
            <div class="detour-actions">
                <button id="insertDetourBtn" type="button" class="btn btn-soft">本文に差し込む</button>
                <button id="regenDetourBtn" type="button" class="btn btn-soft">もう1回寄り道</button>
            </div>
        </section>

        <section class="timeline">
            <div class="timeline-head">
                <h2>投稿一覧</h2>
                <button id="deleteAllBtn" type="button" class="btn btn-danger">全部削除</button>
            </div>
            <ul id="postList" class="post-list"></ul>
            <p id="emptyState" class="empty-state">まだ投稿がありません。最初の1話を書いてみよう。</p>
        </section>
    </main>

    <!-- 気分転換モーダル -->
    <div id="breakModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎮 気分転換タイム</h2>
                <button id="closeBreakBtn" type="button" class="btn-close">✕</button>
            </div>
            <div class="game-info">
                <div class="game-stats">
                    <span>スコア: <strong id="gameScore">0</strong></span>
                    <span>記録: <strong id="bestScore">0</strong></span>
                </div>
            </div>
            <canvas id="breakCanvas" width="360" height="480"></canvas>
            <div class="game-controls">
                <button id="gameStartBtn" type="button" class="btn btn-primary">スタート</button>
                <p class="game-hint">← → キーか画面タップで左右移動</p>
            </div>
            <div id="gameOverMsg" class="game-over-msg hidden">
                <p>ゲームオーバー！</p>
                <p>スコア: <span id="finalGameScore">0</span></p>
            </div>
        </div>
    </div>

    <script>

        const STORAGE_KEY = "novel_posts_v1";
        const DRAFT_KEY = "novel_draft_v1";

        const titleInput = document.getElementById("novelTitle");
        const bodyInput = document.getElementById("novelBody");
        const charCount = document.getElementById("charCount");
        const postBtn = document.getElementById("postBtn");
        const clearDraftBtn = document.getElementById("clearDraftBtn");
        const deleteAllBtn = document.getElementById("deleteAllBtn");
        const postList = document.getElementById("postList");
        const emptyState = document.getElementById("emptyState");
        const detourType = document.getElementById("detourType");
        const detourBtn = document.getElementById("detourBtn");
        const detourResult = document.getElementById("detourResult");
        const insertDetourBtn = document.getElementById("insertDetourBtn");
        const regenDetourBtn = document.getElementById("regenDetourBtn");
        const breakBtn = document.getElementById("breakBtn");
        const breakModal = document.getElementById("breakModal");
        const closeBreakBtn = document.getElementById("closeBreakBtn");
        const breakCanvas = document.getElementById("breakCanvas");
        const gameStartBtn = document.getElementById("gameStartBtn");
        const gameScore = document.getElementById("gameScore");
        const bestScore = document.getElementById("bestScore");
        const gameOverMsg = document.getElementById("gameOverMsg");
        const finalGameScore = document.getElementById("finalGameScore");

        let posts = [];
        let currentDetourText = "";
        let gameRunning = false;
        let gameAnimationId = null;
        let player = { x: 165, y: 400, width: 30, height: 30, lane: 1 };
        let obstacles = [];
        let score = 0;
        let best = parseInt(localStorage.getItem("break_game_best") || "0");
        let obstacleSpeed = 3;
        let spawnCounter = 0;
        const lanes = [60, 165, 270];

        bestScore.textContent = best;

        const detourData = {
            character: {
                leads: ["主人公", "相棒", "宿敵", "語り手", "名もなき通行人"],
                places: ["夜明け前の駅", "人気のない商店街", "雨の図書館", "古い映画館", "港の倉庫"],
                twists: ["秘密の日記を落とす", "昔の約束を思い出す", "苦手な相手を助ける", "正体を隠して会話する", "嘘をついてしまう"]
            },
            event: {
                leads: ["祭りの準備", "授業の帰り道", "配達の途中", "閉店間際の店", "深夜の電話"],
                places: ["橋の上", "地下通路", "屋上", "路地のカフェ", "川沿いのベンチ"],
                twists: ["予定外の停電が起こる", "落とし物が事件の鍵になる", "手紙が一通だけ届かない", "見知らぬ人が未来を知っている", "時計が5分だけ戻る"]
            },
            world: {
                leads: ["街のルール", "魔法の代償", "技術の副作用", "王都の噂", "村の禁忌"],
                places: ["検問所", "地下市場", "研究区画", "祈りの塔", "漂流する庭園"],
                twists: ["一部の人にだけ見える", "触れると記憶が混ざる", "毎週形が変わる", "合言葉で役割が逆転する", "外に出すとただの石になる"]
            }
        };

        function escapeHTML(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function savePosts() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
        }

        function loadPosts() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) {
                posts = [];
                return;
            }

            try {
                posts = JSON.parse(raw);
                if (!Array.isArray(posts)) {
                    posts = [];
                }
            } catch (error) {
                posts = [];
            }
        }

        function saveDraft() {
            const draft = {
                title: titleInput.value,
                body: bodyInput.value
            };
            localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
        }

        function loadDraft() {
            const raw = localStorage.getItem(DRAFT_KEY);
            if (!raw) {
                return;
            }

            try {
                const draft = JSON.parse(raw);
                if (draft && typeof draft === "object") {
                    titleInput.value = draft.title || "";
                    bodyInput.value = draft.body || "";
                }
            } catch (error) {
                localStorage.removeItem(DRAFT_KEY);
            }
        }

        function updateCharCount() {
            charCount.textContent = `${bodyInput.value.length} / 1500`;
        }

        function pickOne(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateDetourPrompt(type) {
            const bank = detourData[type] || detourData.character;
            const lead = pickOne(bank.leads);
            const place = pickOne(bank.places);
            const twist = pickOne(bank.twists);
            return `寄り道案: ${lead}が${place}で${twist}。この寄り道が本筋にどう影響するか、最後の1文で示してみよう。`;
        }

        function generateDetour() {
            currentDetourText = generateDetourPrompt(detourType.value);
            detourResult.textContent = currentDetourText;
        }

        function insertDetourIntoBody() {
            if (!currentDetourText) {
                generateDetour();
            }

            const prefix = bodyInput.value.trim().length === 0 ? "" : "\n\n";
            bodyInput.value += `${prefix}【寄り道メモ】\n${currentDetourText}`;
            updateCharCount();
            saveDraft();
            bodyInput.focus();
        }

        function renderPosts() {
            if (posts.length === 0) {
                postList.innerHTML = "";
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";
            const listHTML = posts.map((post) => {
                const safeTitle = escapeHTML(post.title);
                const safeBody = escapeHTML(post.body).replace(/\n/g, "<br>");
                return `
                    <li class="post-card" data-id="${post.id}">
                        <div class="post-meta">
                            <h3>${safeTitle}</h3>
                            <p>${post.createdAt}</p>
                        </div>
                        <p class="post-body">${safeBody}</p>
                        <div class="post-actions">
                            <button class="btn btn-soft delete-btn" data-id="${post.id}" type="button">削除</button>
                        </div>
                    </li>
                `;
            }).join("");

            postList.innerHTML = listHTML;
        }

        function postNovel() {
            const title = titleInput.value.trim();
            const body = bodyInput.value.trim();

            if (!title || !body) {
                alert("タイトルと本文を入力してください。");
                return;
            }

            const post = {
                id: Date.now(),
                title,
                body,
                createdAt: new Date().toLocaleString("ja-JP")
            };

            posts.unshift(post);
            savePosts();
            renderPosts();

            bodyInput.value = "";
            updateCharCount();
            saveDraft();
        }

        function deletePost(id) {
            posts = posts.filter((post) => String(post.id) !== String(id));
            savePosts();
            renderPosts();
        }

        postBtn.addEventListener("click", postNovel);

        bodyInput.addEventListener("input", () => {
            updateCharCount();
            saveDraft();
        });

        titleInput.addEventListener("input", saveDraft);

        clearDraftBtn.addEventListener("click", () => {
            titleInput.value = "";
            bodyInput.value = "";
            localStorage.removeItem(DRAFT_KEY);
            updateCharCount();
        });

        deleteAllBtn.addEventListener("click", () => {
            if (posts.length === 0) {
                return;
            }

            const agreed = confirm("投稿をすべて削除しますか？");
            if (!agreed) {
                return;
            }

            posts = [];
            savePosts();
            renderPosts();
        });

        detourBtn.addEventListener("click", generateDetour);
        regenDetourBtn.addEventListener("click", generateDetour);
        insertDetourBtn.addEventListener("click", insertDetourIntoBody);

        // 気分転換ゲーム
        function drawPlayer(ctx) {
            ctx.fillStyle = "#0f6a5a";
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function drawObstacle(ctx, obs) {
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        }

        function createObstacle() {
            const laneIndex = Math.floor(Math.random() * 3);
            const colors = ["#9b2c2c", "#c05621", "#744210"];
            obstacles.push({
                x: lanes[laneIndex],
                y: -40,
                width: 30,
                height: 30,
                color: colors[Math.floor(Math.random() * colors.length)]
            });
        }

        function updateObstacles() {
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += obstacleSpeed;
                if (obstacles[i].y > breakCanvas.height) {
                    obstacles.splice(i, 1);
                    score += 10;
                    gameScore.textContent = score;
                    if (score % 50 === 0) {
                        obstacleSpeed += 0.3;
                    }
                }
            }
        }

        function checkCollision() {
            for (let obs of obstacles) {
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    return true;
                }
            }
            return false;
        }

        function movePlayerGame(direction) {
            if (!gameRunning) return;
            if (direction === "left" && player.lane > 0) {
                player.lane--;
            } else if (direction === "right" && player.lane < 2) {
                player.lane++;
            }
            player.x = lanes[player.lane];
        }

        function gameLoop() {
            if (!gameRunning) return;
            const ctx = breakCanvas.getContext("2d");
            ctx.fillStyle = "#2d3748";
            ctx.fillRect(0, 0, breakCanvas.width, breakCanvas.height);

            ctx.strokeStyle = "#4a5568";
            ctx.lineWidth = 2;
            ctx.setLineDash([15, 10]);
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(lanes[i] - 22.5, 0);
                ctx.lineTo(lanes[i] - 22.5, breakCanvas.height);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            drawPlayer(ctx);
            obstacles.forEach(obs => drawObstacle(ctx, obs));
            updateObstacles();

            spawnCounter++;
            if (spawnCounter > 50 - Math.min(score / 100, 25)) {
                createObstacle();
                spawnCounter = 0;
            }

            if (checkCollision()) {
                endGame();
                return;
            }

            gameAnimationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            score = 0;
            obstacles = [];
            obstacleSpeed = 3;
            spawnCounter = 0;
            player.lane = 1;
            player.x = lanes[1];
            gameRunning = true;
            gameScore.textContent = score;
            gameOverMsg.classList.add("hidden");
            gameStartBtn.textContent = "プレイ中...";
            gameStartBtn.disabled = true;
            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(gameAnimationId);
            finalGameScore.textContent = score;
            gameOverMsg.classList.remove("hidden");
            gameStartBtn.textContent = "もう一度";
            gameStartBtn.disabled = false;

            if (score > best) {
                best = score;
                bestScore.textContent = best;
                localStorage.setItem("break_game_best", best.toString());
            }
        }

        breakBtn.addEventListener("click", () => {
            breakModal.classList.remove("hidden");
        });

        closeBreakBtn.addEventListener("click", () => {
            breakModal.classList.add("hidden");
            if (gameRunning) {
                gameRunning = false;
                cancelAnimationFrame(gameAnimationId);
                gameStartBtn.textContent = "スタート";
                gameStartBtn.disabled = false;
            }
        });

        gameStartBtn.addEventListener("click", startGame);

        document.addEventListener("keydown", (e) => {
            if (!breakModal.classList.contains("hidden")) {
                if (e.key === "ArrowLeft") {
                    e.preventDefault();
                    movePlayerGame("left");
                } else if (e.key === "ArrowRight") {
                    e.preventDefault();
                    movePlayerGame("right");
                }
            }
        });

        breakCanvas.addEventListener("click", (e) => {
            if (!gameRunning) return;
            const rect = breakCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            if (x < breakCanvas.width / 2) {
                movePlayerGame("left");
            } else {
                movePlayerGame("right");
            }
        });

        breakCanvas.addEventListener("touchstart", (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            const touch = e.touches[0];
            const rect = breakCanvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            if (x < breakCanvas.width / 2) {
                movePlayerGame("left");
            } else {
                movePlayerGame("right");
            }
        });

        postList.addEventListener("click", (event) => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) {
                return;
            }

            if (target.classList.contains("delete-btn")) {
                deletePost(target.dataset.id);
            }
        });

        loadPosts();
        loadDraft();
        updateCharCount();
        renderPosts();
        generateDetour();
    </script>
</body>
</html>
